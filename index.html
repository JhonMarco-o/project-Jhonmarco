<style>
    .card {
        backdrop-filter: blur(12px);
        border-radius: 20px;
        border: 1px solid rgb(255, 255, 255);
    }
    
    .hero {
        position: relative;
        min-height: 100px;
        border-radius: 0 0 30px 30px;
        overflow: visible;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        backdrop-filter: blur(1px);
        transition: background 0.9s ease-in-out;
    }
    
    .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
    }
    
    .slider-wrapper {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .slider {
        position: relative;
        width: 100%;
        max-width: 700px;
        height: 260px;
    }
    
    .card-item {
        position: absolute;
        width: 170px;
        height: 250px;
        left: 50%;
        top: 20%;
        transform: translate(-50%, -50%);
        border-radius: 15px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        box-shadow: 0 10px 30px rgb(0, 0, 0);
        transition: transform 0.5s ease, opacity 0.5s ease;
    }
    
    .card-item:hover {
        transform: translate(-50%, -50%) scale(1.1);
    }
    
    .carousel {
        position: relative;
        width: 100%;
        max-width: 700px;
        margin: auto;
    }
    
    .controllers {
        position: absolute;
        top: 60%;
        left: 0;
        width: 100%;
        transform: translateY(-50%);
        display: flex;
        justify-content: space-between;
        z-index: 20;
        pointer-events: none;
    }
    
    .carousel-btn {
        pointer-events: all;
        background: rgba(0, 0, 0, 0.6);
        border: none;
        color: white;
        font-size: 18px;
        padding: 12px 16px;
        border-radius: 50%;
        backdrop-filter: blur(10px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.6);
        transition: 0.3s;
    }
    
    .carousel-btn:hover {
        background: rgba(255, 255, 255, 0.4);
    }
    
    .prev {
        left: 10px;
    }
    
    .next {
        right: 10px;
    }
    
    @media (max-width: 576px) {
        .card-item {
            width: 110px;
            height: 160px;
        }
    }
</style>

        let mode = "light";
        let gods = [];
        let allGods = [];
        let index = 0;

        function switchTheme() {
            if (mode == "light") {
                mode = "dark";
                document.getElementById("modeBtn").innerHTML = "Light Mode";
            } else {
                mode = "light";
                document.getElementById("modeBtn").innerHTML = "Dark Mode";
            }

            document.body.setAttribute("data-bs-theme", mode);
        }

        async function loadGods() {
            try {

                const res = await fetch("https://thegreekmythapi.vercel.app/api/gods");
                const data = await res.json();

                console.log(data);

                allGods = data.map(god => ({
                    name: god.name,
                    img: godImages[god.name],
                    desc: god.description
                }));

                gods = [...allGods];

                renderCards();

            } catch (err) {
                console.error("Error loading Gods:", err);
            }
        }


        function renderCards() {
            slider.innerHTML = "";

            gods.forEach((p, i) => {
                const card = document.createElement("div");
                card.className = "card-item";
                card.style.backgroundImage = `url(${p.img})`;

                // Click to jump
                card.addEventListener("click", () => {
                    index = i;
                    updateCarousel();
                });

                slider.appendChild(card);
            });

            updateCarousel();
        }


        function updateCarousel() {
            const cards = document.querySelectorAll(".card-item");


            const base = window.innerWidth;
            let gap1 = base < 576 ? 100 : base < 768 ? 140 : 200;
            let gap2 = base < 576 ? 180 : base < 768 ? 260 : 380;

            cards.forEach((card, i) => {
                let offset = i - index;

                if (offset < -2) offset += gods.length;
                if (offset > 2) offset -= gods.length;

                let transform = "";
                let opacity = "0";
                let zIndex = "1";

                if (offset === 0) {
                    transform = `translate(-50%, -50%) translateX(0px) scale(${base < 576 ? 1.1 : 1.25})`;
                    opacity = "1";
                    zIndex = "5";
                } else if (offset === -1) {
                    transform = `translate(-50%, -50%) translateX(-${gap1}px) scale(1)`;
                    opacity = "0.8";
                    zIndex = "4";
                } else if (offset === 1) {
                    transform = `translate(-50%, -50%) translateX(${gap1}px) scale(1)`;
                    opacity = "0.8";
                    zIndex = "4";
                } else if (offset === -2) {
                    transform = `translate(-50%, -50%) translateX(-${gap2}px) scale(0.8)`;
                    opacity = "0.5";
                    zIndex = "3";
                } else if (offset === 2) {
                    transform = `translate(-50%, -50%) translateX(${gap2}px) scale(0.8)`;
                    opacity = "0.5";
                    zIndex = "3";
                } else {
                    transform = "translate(-50%, -50%) scale(0)";
                    opacity = "0";
                    zIndex = "0";
                }

                card.style.transform = transform;
                card.style.opacity = opacity;
                card.style.zIndex = zIndex;
            });

            updateHero();
        }


        function updateHero() {
            const p = gods[index];
            if (!p) return;

            hero.style.backgroundImage =
                `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
    url(${godBackgrounds[p.name]})`;
            title.innerText = p.name.toUpperCase();
            desc.innerText = p.desc;
        }

        document.getElementById("next").addEventListener("click", () => {
            index = (index + 1) % gods.length;
            updateCarousel();
        });

        document.getElementById("prev").addEventListener("click", () => {
            index = (index - 1 + gods.length) % gods.length;
            updateCarousel();
        });

        window.addEventListener("resize", () => {
            updateCarousel();
        });

        document.getElementById("searchForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const searchValue = document
                .getElementById("searchInput")
                .value
                .toLowerCase()
                .trim();

            if (searchValue === "") return;

            const foundIndex = gods.findIndex(god =>
                god.name.toLowerCase().includes(searchValue)
            );

            if (foundIndex !== -1) {
                index = foundIndex;
                updateCarousel();
            } else {
                title.innerText = "NOT FOUND";
                desc.innerText = "Try another search.";

            }
        });

        loadGods();
    </script>

</body>
