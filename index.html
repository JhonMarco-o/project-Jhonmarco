<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    body {
        background: url('https://wallpapers.com/images/featured/dark-forest-background-ncekxir0j5a9qd8k.webp') no-repeat center/cover;
        position: relative;
    }
    
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
    }
    
    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        border: 1px solid rgb(255, 255, 255);
    }
    
    .carousel {
        position: relative;
        width: 100%;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .carousel-track {
        display: flex;
        transition: transform 0.6s ease;
    }
    
    .carousel-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 24px;
        padding: 8px 12px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 3;
    }
    
    .carousel-btn:hover {
        background: rgba(255, 255, 255, 0.4);
    }
    
    .prev {
        left: 10px;
    }
    
    .next {
        right: 10px;
    }
</style>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">


            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12 col-xl-5">
                <div class="card my-2 shadow rounded-5 text-light p-4 py-xl-4">
                    <form class="d-flex" role="search">
                        <div class="h2 text-center"></div>
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 col-xl-12 mt-3">
            <div class="card shadow rounded-5 text-light p-4">
                <h2 class="text-center mb-2">HERO STORIES</h2>
            </div>
            <div class="carousel mt-5">
                <button class="carousel-btn prev">&#10094;</button>
                <div class="carousel-track" id="track"></div>
                <button class="carousel-btn next">&#10095;</button>
            </div>
        </div>



        <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js " integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI " crossorigin="anonymous "></script>
</body>

</html>
